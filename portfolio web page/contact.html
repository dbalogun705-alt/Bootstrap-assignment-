<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio contact page</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #0a1628, #1e3a5f, #4faf8d, #0d2137);
             background-repeat: no-repeat;
             background-attachment: fixed;
             min-height: 100vh;">
    <div class="forms container pt-5 mt-5" style="max-width: 600px; margin: 0 auto; padding: 20px; background-color: rgba(255, 255, 255, 0.8); border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
<form action="#" method="post">
<h2> Feedback Form</h2><br><br>

<label class="name" for="name">Full name </label>
<input type="text"required id="name" name="name" placeholder="Balogun Ayomikun"><br><br><br><br>

<label class="Email" for="Email">Email Address</label>
<input type="email" required id="email" name="email" placeholder="dbalogun705@gmail.com"  ><br><br><br><br>

<label class="Feedback" for="Feedback">Message</label>
<input type="text area"required id="message" name="Feedback" placeholder="Your feedback is very important to us"><br><br>
<button class="btn" type="submit"  style="background-color:  #0a1628; color: white;">Send</button>

</form>    

</div>
    
</body>
</html>
